name: myapp

services:

  # ─────────────────────────────────────────────
  # Laravel Backend (PHP-FPM — production build)
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ../
      dockerfile: infrastructure/docker/backend/Dockerfile
      target: production
    container_name: myapp_backend
    restart: always
    env_file:
      - ../backend/.env
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - myapp_network

  # ─────────────────────────────────────────────
  # Nginx — Laravel reverse proxy / FastCGI
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: myapp_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../backend/public:/var/www/html/public:ro
      - ./nginx/conf.d/backend.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro                      # mount your SSL certs here
    depends_on:
      - backend
    networks:
      - myapp_network

  # ─────────────────────────────────────────────
  # ReactJS Frontend (pre-built, served by Nginx)
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ../
      dockerfile: infrastructure/docker/frontend/Dockerfile
      target: production
    container_name: myapp_frontend
    restart: always
    ports:
      - "127.0.0.1:3000:80"
    env_file:
      - ../frontend/.env
    networks:
      - myapp_network

  # ─────────────────────────────────────────────
  # MySQL Database
  # ─────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: myapp_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${MYSQL_USER}", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - myapp_network

networks:
  myapp_network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
