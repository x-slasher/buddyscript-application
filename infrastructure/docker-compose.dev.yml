name: myapp

services:

  # ─────────────────────────────────────────────
  # Laravel Backend (PHP-FPM)
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ../                                          # repo root
      dockerfile: infrastructure/docker/backend/Dockerfile
      target: development
    container_name: myapp_backend
    restart: unless-stopped
    volumes:
      - ../backend:/var/www/html                           # live reload Laravel code
      - /var/www/html/vendor                               # preserve container's vendor/
    env_file:
      - ../backend/.env
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - myapp_network

  # ─────────────────────────────────────────────
  # Nginx — Laravel reverse proxy / FastCGI
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: myapp_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ../backend:/var/www/html:ro
      - ./nginx/conf.d/backend.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - myapp_network

  # ─────────────────────────────────────────────
  # ReactJS Frontend (Vite dev server)
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ../                                           # repo root
      dockerfile: infrastructure/docker/frontend/Dockerfile
      target: development
    container_name: myapp_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ../frontend:/app                                   # live reload React code
      - /app/node_modules                                  # preserve container's node_modules/
    env_file:
      - ../frontend/.env
    networks:
      - myapp_network

  # ─────────────────────────────────────────────
  # MySQL Database
  # ─────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: myapp_mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: laravel_db
      MYSQL_USER: laravel_user
      MYSQL_PASSWORD: laravel_password
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "laravel_user", "-plaravel_password"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - myapp_network

networks:
  myapp_network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
